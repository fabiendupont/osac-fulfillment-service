syntax = "proto3";

package osac.private.v1;

import "osac/private/v1/metadata_type.proto";

// A ComputeInstanceGroup manages a scaled set of identical ComputeInstances with placement semantics.
// Scaling up increases replicas and creates new ComputeInstances. Scaling down removes instances
// (last created first).
message ComputeInstanceGroup {
  string id = 1;
  Metadata metadata = 2;
  ComputeInstanceGroupSpec spec = 3;
  ComputeInstanceGroupStatus status = 4;
}

message ComputeInstanceGroupSpec {
  // Reference to the ComputeInstanceClass for all instances in this group.
  string compute_instance_class = 1;

  // Desired number of ComputeInstances in the group.
  int32 replicas = 2;

  // Reference to an Image resource by name.
  optional string image_ref = 3;

  // References to SSHKey resources by name.
  repeated string ssh_key_refs = 4;

  // Subnet ID for network attachment.
  optional string subnet = 5;

  // SecurityGroup IDs for security policies.
  repeated string security_groups = 6;

  // User data for all instances in the group.
  optional string user_data = 7;

  // Region narrows template selection within the class.
  optional string region = 8;

  // Placement policy for instance distribution.
  optional ComputeInstanceGroupPlacementPolicy placement_policy = 9;
}

// Placement policy controls how instances are distributed across infrastructure.
message ComputeInstanceGroupPlacementPolicy {
  // Strategy for placement: "pack" fills groups before spilling, "spread" distributes across domains.
  string strategy = 1;

  // Host variable name to group by for affinity (e.g. "nvlink_domain", "rack").
  optional string affinity_key = 2;
}

message ComputeInstanceGroupStatus {
  // Current lifecycle state of the group.
  ComputeInstanceGroupState state = 1;

  // Number of instances that are in RUNNING state.
  int32 ready_replicas = 2;

  // List of ComputeInstance IDs managed by this group.
  repeated string instances = 3;

  // Human-readable message providing additional details about the current state.
  optional string message = 4;
}

enum ComputeInstanceGroupState {
  COMPUTE_INSTANCE_GROUP_STATE_UNSPECIFIED = 0;
  COMPUTE_INSTANCE_GROUP_STATE_PENDING = 1;
  COMPUTE_INSTANCE_GROUP_STATE_READY = 2;
  COMPUTE_INSTANCE_GROUP_STATE_SCALING = 3;
  COMPUTE_INSTANCE_GROUP_STATE_FAILED = 4;
}
