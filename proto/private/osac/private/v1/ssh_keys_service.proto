syntax = "proto3";

package osac.private.v1;

import "google/api/annotations.proto";
import "google/protobuf/field_mask.proto";
import "osac/private/v1/ssh_key_type.proto";

message SSHKeysListRequest {
  // Index of the first result. If not specified the default value will be zero.
  optional int32 offset = 1;

  // Maximum number of results to be returned by the server. When not specified all the results will be returned. Note
  // that there may not be enough results to return, and that the server may decide, for performance reasons, to return
  // less results than requested.
  optional int32 limit = 2;

  // Filter criteria.
  //
  // The value of this parameter is a [CEL](https://cel.dev) expression used to select which objects to return. The
  // built-in `this` variable refers to the object being tested and `now` refers to the current date and time. If the
  // expression evaluates to `true` the object is included in the results. For example, to retrieve all SSH keys
  // with names starting with `prod`:
  //
  //     this.metadata.name.startsWith("prod")
  //
  // If this isn't provided, or if the value is empty, then all the SSH keys that the user has permission to see
  // will be returned. Not all CEL constructs are currently supported for implementation reasons; see the filter
  // documentation (docs/FILTER.md) for the full details.
  optional string filter = 3;

  // Order criteria.
  //
  // The syntax of this parameter is similar to the syntax of the _order by_ clause of a SQL statement, but using the
  // names of the attributes of the SSH key instead of the names of the columns of a table. For example, in order to
  // sort the SSH keys descending by name the value should be:
  //
  //     metadata.name desc
  //
  // If the parameter isn't provided, or if the value is empty, then the order of the results is undefined.
  optional string order = 4;
}

message SSHKeysListResponse {
  // Actual number of items returned. Note that this may be smaller than the value requested in the `limit` parameter
  // of the request if there are not enough items, or if the system decides that returning that number of items isn't
  // feasible or convenient for performance reasons.
  int32 size = 3;

  // Total number of items of the collection that match the search criteria, regardless of the number of results
  // requested with the `limit` parameter.
  int32 total = 4;

  // List of results.
  repeated SSHKey items = 5;
}

message SSHKeysGetRequest {
  string id = 1;
}

message SSHKeysGetResponse {
  SSHKey object = 1;
}

message SSHKeysCreateRequest {
  SSHKey object = 1;
}

message SSHKeysCreateResponse {
  SSHKey object = 1;
}

message SSHKeysUpdateRequest {
  SSHKey object = 1;
  google.protobuf.FieldMask update_mask = 2;

  // Lock enables optimistic locking. When set to true, the server verifies that the current version of the object
  // matches the value of the metadata.version field of the submitted object. If they differ the update will be
  // rejected. This is useful to prevent lost updates when multiple clients are modifying the same object concurrently.
  bool lock = 3;
}

message SSHKeysUpdateResponse {
  SSHKey object = 1;
}

message SSHKeysDeleteRequest {
  string id = 1;
}

message SSHKeysDeleteResponse {}

message SSHKeysSignalRequest {
  string id = 1;
}

message SSHKeysSignalResponse {}

service SSHKeys {
  // Retrieves the list of SSH keys.
  rpc List(SSHKeysListRequest) returns (SSHKeysListResponse) {
    option (google.api.http) = {get: "/api/private/v1/ssh_keys"};
  }

  // Retrieves the details of one specific SSH key.
  rpc Get(SSHKeysGetRequest) returns (SSHKeysGetResponse) {
    option (google.api.http) = {
      get: "/api/private/v1/ssh_keys/{id}"
      response_body: "object"
    };
  }

  // Creates a new SSH key.
  rpc Create(SSHKeysCreateRequest) returns (SSHKeysCreateResponse) {
    option (google.api.http) = {
      post: "/api/private/v1/ssh_keys"
      body: "object"
      response_body: "object"
    };
  }

  // Updates an existing SSH key.
  rpc Update(SSHKeysUpdateRequest) returns (SSHKeysUpdateResponse) {
    option (google.api.http) = {
      patch: "/api/private/v1/ssh_keys/{object.id}"
      body: "object"
      response_body: "object"
    };
  }

  // Deletes an SSH key.
  rpc Delete(SSHKeysDeleteRequest) returns (SSHKeysDeleteResponse) {
    option (google.api.http) = {delete: "/api/private/v1/ssh_keys/{id}"};
  }

  // Indicates that something changed in the object or the system that may require reconciling the object.
  rpc Signal(SSHKeysSignalRequest) returns (SSHKeysSignalResponse) {
  }
}
