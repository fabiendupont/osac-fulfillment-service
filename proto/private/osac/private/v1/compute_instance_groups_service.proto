syntax = "proto3";

package osac.private.v1;

import "google/api/annotations.proto";
import "google/protobuf/field_mask.proto";
import "osac/private/v1/compute_instance_group_type.proto";

message ComputeInstanceGroupsListRequest {
  optional int32 offset = 1;
  optional int32 limit = 2;
  optional string filter = 3;
}

message ComputeInstanceGroupsListResponse {
  int32 size = 1;
  int32 total = 2;
  repeated ComputeInstanceGroup items = 3;
}

message ComputeInstanceGroupsGetRequest {
  string id = 1;
}

message ComputeInstanceGroupsGetResponse {
  ComputeInstanceGroup object = 1;
}

message ComputeInstanceGroupsCreateRequest {
  ComputeInstanceGroup object = 1;
}

message ComputeInstanceGroupsCreateResponse {
  ComputeInstanceGroup object = 1;
}

message ComputeInstanceGroupsDeleteRequest {
  string id = 1;
}

message ComputeInstanceGroupsDeleteResponse {}

message ComputeInstanceGroupsUpdateRequest {
  ComputeInstanceGroup object = 1;
  google.protobuf.FieldMask update_mask = 2;
  bool lock = 3;
}

message ComputeInstanceGroupsUpdateResponse {
  ComputeInstanceGroup object = 1;
}

message ComputeInstanceGroupsSignalRequest {
  string id = 1;
}

message ComputeInstanceGroupsSignalResponse {}

service ComputeInstanceGroups {
  rpc List(ComputeInstanceGroupsListRequest) returns (ComputeInstanceGroupsListResponse) {
    option (google.api.http) = {get: "/api/private/v1/compute_instance_groups"};
  }
  rpc Get(ComputeInstanceGroupsGetRequest) returns (ComputeInstanceGroupsGetResponse) {
    option (google.api.http) = {
      get: "/api/private/v1/compute_instance_groups/{id}"
      response_body: "object"
    };
  }
  rpc Create(ComputeInstanceGroupsCreateRequest) returns (ComputeInstanceGroupsCreateResponse) {
    option (google.api.http) = {
      post: "/api/private/v1/compute_instance_groups"
      body: "object"
      response_body: "object"
    };
  }
  rpc Delete(ComputeInstanceGroupsDeleteRequest) returns (ComputeInstanceGroupsDeleteResponse) {
    option (google.api.http) = {delete: "/api/private/v1/compute_instance_groups/{id}"};
  }
  rpc Update(ComputeInstanceGroupsUpdateRequest) returns (ComputeInstanceGroupsUpdateResponse) {
    option (google.api.http) = {
      patch: "/api/private/v1/compute_instance_groups/{object.id}"
      body: "object"
      response_body: "object"
    };
  }
  rpc Signal(ComputeInstanceGroupsSignalRequest) returns (ComputeInstanceGroupsSignalResponse) {}
}
