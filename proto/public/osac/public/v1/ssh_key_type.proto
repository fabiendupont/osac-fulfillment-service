syntax = "proto3";

package osac.public.v1;

import "osac/public/v1/metadata_type.proto";

// Represents an SSH public key owned by a tenant user.
//
// SSHKey is a tenant-managed resource that stores an SSH public key for use when provisioning ComputeInstances.
// A single SSHKey can be referenced by multiple ComputeInstances, enabling centralized key management.
//
// The fingerprint field is computed by the server from the public_key and cannot be set directly by the client.
message SSHKey {
  // Unique identifier of the SSH key.
  string id = 1;

  // Metadata of the SSH key.
  Metadata metadata = 2;

  // SSH public key in authorized_keys format. For example:
  // "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAI... user@host".
  string public_key = 3;

  // SHA256 fingerprint of the public key, computed by the server. This field is read-only and cannot be
  // set by the client.
  string fingerprint = 4;
}
